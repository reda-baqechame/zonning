name: Sync datasets

on:
  push:
    paths:
      - ".github/workflows/sync-datasets.yml"
  schedule:
    - cron: "*/15 * * * *"
    - cron: "0 */4 * * *"
    - cron: "0 8 * * 0"
    - cron: "0 3 * * *"
    - cron: "0 */6 * * *"
    - cron: "0 12 * * *"
    - cron: "0 6 * * *"
    - cron: "0 13 * * 4"
  workflow_dispatch:

jobs:
  validate-workflow:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Sync workflow valid — crons run on schedule only"

  sync-live-scheduler:
    if: github.event_name != 'push' && (github.event.schedule == '*/15 * * * *' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Live watch — permits, SEAO, roadworks
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/sync?mode=live"

      - name: Scheduler batch — stale/changed datasets
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/sync?mode=scheduler"

      - name: RGM priority sync
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/sync?mode=rgm"

      - name: Live user alerts (15 min window)
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/alerts?mode=live"

  sync-daily-tier:
    if: github.event_name != 'push' && (github.event.schedule == '0 */4 * * *' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Daily-tier datasets
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/sync?tier=daily"

  sync-weekly-tier:
    if: github.event_name != 'push' && (github.event.schedule == '0 8 * * 0' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Weekly-tier datasets
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/sync?tier=weekly"

      - name: Weekly Montréal permit backfill (self-heal)
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/sync?mode=backfill&dataset=permits"

  sync-bootstrap:
    if: github.event_name != 'push' && (github.event.schedule == '0 */6 * * *' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Bootstrap never-synced datasets
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/sync?mode=bootstrap&rounds=4"

  sync-alerts:
    if: github.event_name != 'push' && (github.event.schedule == '0 12 * * *' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Daily alert emails
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/alerts"

  sync-gtm-stats:
    if: github.event_name != 'push' && (github.event.schedule == '0 6 * * *' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: GTM stats cron
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/stats"

  sync-thursday:
    if: github.event_name != 'push' && (github.event.schedule == '0 13 * * 4' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Thursday SEAO close alerts
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/thursday"

  sync-nightly-all:
    if: github.event_name != 'push' && (github.event.schedule == '0 3 * * *' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Chunked full sync (4 batches)
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/sync?tier=all"

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Verify deploy (full)
        env:
          NEXT_PUBLIC_APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          npm install --no-audit --no-fund
          npm run verify:deploy
